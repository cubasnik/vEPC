---
# Ansible Playbook for vEPC Deployment
# Target: Ubuntu 22 LTS and higher
# Requirements: Ansible 2.9+, Python 3.8+
- name: Deploy vEPC (Evolved Packet Core Platform)
  hosts: vepc_hosts
  become: yes
  become_method: sudo
  
  vars:
    # Repository configuration
    vepc_repo_url: "https://github.com/cubasnik/vEPC.git"
    vepc_repo_branch: "main"
    vepc_repo_path: "/opt/vepc"
    vepc_redeploy_clean: true
    
    # User and group
    vepc_user: "vepc"
    vepc_group: "vepc"
    vepc_uid: 1000
    vepc_gid: 1000
    
    # Build paths
    build_path: "{{ vepc_repo_path }}/build"
    
    # Configuration
    config_path: "/etc/vepc"
    log_path: "/var/log/vepc"
    
    # Ports (can be overridden per host)
    gtp_c_port: 2123
    s1ap_port: 36412
    diameter_port: 3868
    cli_port: 5555
    # Path to CLI unix socket created by vEPC (used for readiness checks)
    cli_socket_path: "/tmp/vepc.sock"
    # Mount mode for host /tmp inside containers (rw or ro). Use 'rw' for reliability.
    tmp_mount_mode: "rw"
    # Detected docker compose command (populated in pre_tasks)
    docker_compose_cmd: "docker compose"
    ssh_cli_enabled: true
    ssh_cli_port: 2205
    # List of CLI users to create. Passwords are stored in plaintext here and hashed on deployment.
    # Override per host in inventory with: cli_users='[{"name":"admin","password":"secret"}]'
    cli_users:
      - name: "vepccli"
        password: "vepccli"

    # Set to true to force Docker image rebuild on every deploy (--no-cache)
    vepc_force_rebuild: true
    # When true, run an aggressive buildx/builder prune before builds. Keep false to preserve cache.
    vepc_prune_buildkit: false
    # Base image to pre-pull to speed builds
    vepc_base_image: "ubuntu:22.04"
    # Previous image to use as cache-from when available
    vepc_previous_image_cache: "docker.io/vepc-vepc:latest"

    # Docker configuration
    docker_registry: "docker.io"
    vepc_docker_image: "vepc:latest"
    vepc_container_name: "vepc-mme-sgsn"
    # Optional removal of legacy container instances (set true to remove old containers)
    vepc_remove_old_container: true
    vepc_old_container_name: "vepc-mme-sgsn"
    
    # Network configuration
    enable_network_namespaces: true
    
  pre_tasks:
    - name: Validate target OS
      assert:
        that:
          - ansible_distribution == "Ubuntu"
          - ansible_distribution_version is version('22.04', '>=')
        fail_msg: "This playbook requires Ubuntu 22.04 LTS or higher"

    - name: Pre-clean Docker apt source files before apt tasks
      shell: |
        rm -f /etc/apt/sources.list.d/docker.sources
        rm -f /etc/apt/sources.list.d/docker.list
        for f in /etc/apt/sources.list /etc/apt/sources.list.d/*.list /etc/apt/sources.list.d/*.sources; do
          [ -f "$f" ] || continue
          sed -i '/download\.docker\.com\/linux\/ubuntu/d' "$f"
        done
      args:
        executable: /bin/bash
      changed_when: false

    - name: Validate traffic Linux port allowlist is configured
      assert:
        that:
          - traffic_linux_ports is defined
          - traffic_linux_ports | length > 0
        fail_msg: >-
          Set traffic_linux_ports as YAML list in ansible/group_vars/vepc_hosts.yml,
          for example: traffic_linux_ports: ["eno1", "eno2"]

    - name: Normalize traffic Linux port allowlist
      set_fact:
        traffic_linux_ports: >-
          {{
            traffic_linux_ports
            if traffic_linux_ports is sequence and traffic_linux_ports is not string
            else (traffic_linux_ports | from_yaml)
          }}

    - name: Validate traffic Linux port allowlist type
      assert:
        that:
          - traffic_linux_ports is sequence
          - traffic_linux_ports is not string
          - traffic_linux_ports | length > 0
        fail_msg: >-
          traffic_linux_ports must be a YAML list, for example:
          traffic_linux_ports: ["eno1", "eno2"]

    - name: Validate traffic Linux port names
      assert:
        that:
          - item is match('^[A-Za-z0-9_.:-]+$')
        fail_msg: "Invalid traffic port name '{{ item }}'"
      loop: "{{ traffic_linux_ports }}"

    - name: Validate traffic Linux ports exist on target host
      assert:
        that:
          - item in ansible_interfaces
        fail_msg: "Configured traffic port '{{ item }}' not found on host interfaces: {{ ansible_interfaces | join(', ') }}"
      loop: "{{ traffic_linux_ports }}"

    - name: Ensure 8021q kernel module is loaded
      command: modprobe 8021q
      changed_when: false

    - name: Persist 8021q module across reboots
      copy:
        dest: /etc/modules-load.d/vepc-vlan.conf
        mode: '0644'
        content: |
          8021q

    - name: Collect OVS master mapping for traffic ports
      shell: |
        set -e
        port={{ item }}
        if [ -L "/sys/class/net/${port}/master" ]; then
          basename "$(readlink -f "/sys/class/net/${port}/master")"
        else
          echo "none"
        fi
      args:
        executable: /bin/bash
      register: traffic_port_master
      loop: "{{ traffic_linux_ports }}"
      changed_when: false

    - name: Validate traffic ports are not enslaved to Open vSwitch
      assert:
        that:
          - item.stdout != 'ovs-system'
        fail_msg: >-
          traffic port '{{ item.item }}' is managed by Open vSwitch (master=ovs-system).
          Select a free Linux NIC in traffic_linux_ports or detach this NIC from OVS before deploy.
      loop: "{{ traffic_port_master.results }}"

    - name: Read existing vEPC config to preserve PLMN across redeploys
      slurp:
        src: "{{ config_path }}/vepc.config"
      register: vepc_config_existing
      ignore_errors: yes

    - name: Compute effective PLMN values
      set_fact:
        plmn_mcc: >-
          {{
            ((vepc_config_existing.content | default('') | b64decode)
            | regex_findall('(?mi)^\s*MCC\s*=\s*([0-9]{3})\s*$')
            | first) | default('250')
          }}
        plmn_mnc: >-
          {{
            ((vepc_config_existing.content | default('') | b64decode)
            | regex_findall('(?mi)^\s*MNC\s*=\s*([0-9]{2,3})\s*$')
            | first) | default('20')
          }}

    - name: Compute padded MNC for realm fields
      set_fact:
        plmn_mnc3: "{{ '%03d' | format(plmn_mnc | int) }}"

  tasks:
    # ==================== System Preparation ====================
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install system dependencies
      apt:
        name:
          - build-essential
          - cmake
          - git
          - curl
          - wget
          - net-tools
          - iproute2
          - tcpdump
          - jq
          - python3
          - python3-pip
          - ca-certificates
          - gnupg
          - lsb-release
          - openssh-server
        state: present

    # ==================== Docker Installation ====================
    - name: Remove legacy Docker apt sources to avoid Signed-By conflicts
      shell: |
        set -e
        for f in /etc/apt/sources.list /etc/apt/sources.list.d/*.list /etc/apt/sources.list.d/*.sources; do
          [ -f "$f" ] || continue
          if grep -q "download.docker.com/linux/ubuntu" "$f"; then
            sed -i '/download\.docker\.com\/linux\/ubuntu/d' "$f"
          fi
        done
      args:
        executable: /bin/bash

    - name: Ensure apt keyrings directory exists
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Remove malformed docker.sources file if present
      file:
        path: /etc/apt/sources.list.d/docker.sources
        state: absent

    - name: Install Docker GPG key to keyring
      get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: '0644'

    - name: Add Docker repository (signed-by keyring)
      apt_repository:
        repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        filename: docker
        state: present
        update_cache: yes

    - name: Install Docker
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-compose-plugin
        state: present

    - name: Start Docker service
      service:
        name: docker
        state: started
        enabled: yes

    # ==================== User and Directory Setup ====================
    - name: Create vepc group
      group:
        name: "{{ vepc_group }}"
        state: present

    - name: Create vepc user
      user:
        name: "{{ vepc_user }}"
        group: "{{ vepc_group }}"
        home: "/home/{{ vepc_user }}"
        shell: /bin/bash
        createhome: yes
        state: present

    - name: Add vepc user to docker group
      user:
        name: "{{ vepc_user }}"
        groups: docker
        append: yes

    - name: Create required directories
      file:
        path: "{{ item }}"
        state: directory
        owner: "{{ vepc_user }}"
        group: "{{ vepc_group }}"
        mode: '0755'
      loop:
        - "{{ config_path }}"
        - "{{ log_path }}"

    # ==================== Repository Setup ====================
    - name: Remove existing repository path on redeploy
      file:
        path: "{{ vepc_repo_path }}"
        state: absent
      when: vepc_redeploy_clean | bool

    - name: Ensure repository directory exists
      file:
        path: "{{ vepc_repo_path }}"
        state: directory
        owner: "{{ vepc_user }}"
        group: "{{ vepc_group }}"
        mode: '0755'

    - name: Allow git safe.directory for root
      command: git config --global --add safe.directory {{ vepc_repo_path }}
      changed_when: false

    - name: Allow git safe.directory for deployment user
      command: git config --global --add safe.directory {{ vepc_repo_path }}
      become: true
      become_user: "{{ vepc_user }}"
      changed_when: false

    - name: Clone or update repository from GitHub (force clean)
      git:
        repo: "{{ vepc_repo_url }}"
        dest: "{{ vepc_repo_path }}"
        version: "{{ vepc_repo_branch }}"
        update: true
        force: true
      become: true
      # Run git as root to avoid permission errors on /opt mount points.
      # Later we ensure correct ownership with a chown task.
    - name: Ensure repository matches origin/{{ vepc_repo_branch }} (force)
      shell: |
        git fetch --all --prune
        git reset --hard origin/{{ vepc_repo_branch }}
        git clean -fdx
      args:
        chdir: "{{ vepc_repo_path }}"
      become: true
      # Run as root to ensure operations succeed even if permissions are strict.
    - name: Ensure scripts directory exists after repository setup
      file:
        path: "{{ vepc_repo_path }}/scripts"
        state: directory
        owner: "{{ vepc_user }}"
        group: "{{ vepc_group }}"
        mode: '0755'

    - name: Ensure repository ownership is correct
      file:
        path: "{{ vepc_repo_path }}"
        state: directory
        recurse: yes
        owner: "{{ vepc_user }}"
        group: "{{ vepc_group }}"
      become: true

    # ==================== Docker Build ====================
    - name: Render deployment Dockerfile to target repository
      template:
        src: "Dockerfile.j2"
        dest: "{{ vepc_repo_path }}/Dockerfile"
        owner: "{{ vepc_user }}"
        group: "{{ vepc_group }}"
        mode: '0644'

    - name: Render .dockerignore to target repository
      template:
        src: ".dockerignore.j2"
        dest: "{{ vepc_repo_path }}/.dockerignore"
        owner: "{{ vepc_user }}"
        group: "{{ vepc_group }}"
        mode: '0644'

    - name: Build Docker image from Dockerfile
      block:
        - name: Prune Docker build cache to avoid corrupted BuildKit snapshots (optional)
          shell: |
            # Run prune only when explicitly requested to avoid losing useful cache
            docker buildx prune --all --force || docker builder prune --force || true
          become: yes
          changed_when: false
          ignore_errors: yes
          when: vepc_prune_buildkit | default(false) | bool

        - name: Ensure Docker 'bridge' network exists, restart docker if missing
          shell: |
            if ! docker network inspect bridge >/dev/null 2>&1; then
              systemctl restart docker || service docker restart || true
              sleep 3
            fi
          register: docker_net_check
          changed_when: false

        - name: Pre-pull base image to speed builds
          shell: docker pull {{ vepc_base_image }} || true
          become: yes
          changed_when: false

        - name: Try build web image (use host network for npm install to avoid bridge issues)
          shell: |
            cd {{ vepc_repo_path }}
            DOCKER_BUILDKIT=0 docker build --network=host -f {{ vepc_repo_path }}/web/Dockerfile -t vepc-vepc-web:latest {{ vepc_repo_path }}/web
          register: web_build
          become: yes
          retries: 3
          delay: 10
          until: web_build.rc == 0

        - name: Reset buildx builders (if present) to avoid stale snapshots
          shell: |
            if docker buildx version >/dev/null 2>&1; then
              # remove all existing builders (ignore errors)
              docker buildx ls --format '{{"{{.Name}}"}}' 2>/dev/null | xargs -r -n1 docker buildx rm || true
              # create a fresh builder and select it
              docker buildx create --use --name vepc-builder || true
            fi
          become: yes
          changed_when: false
          ignore_errors: yes

        - name: Pull previous vepc image for cache reuse (optional)
          shell: docker pull {{ vepc_previous_image_cache }} || true
          become: yes
          changed_when: false

        - name: Try build vepc core image (disable BuildKit, optional no-cache, use host network, cache-from)
          shell: |
            set -o pipefail
            cd {{ vepc_repo_path }}
            export DOCKER_BUILDKIT=0
            BUILD_LOG=/var/log/vepc_core_build.log
            rm -f "$BUILD_LOG" || true
            echo "Starting vEPC core build: $(date -u +"%Y-%m-%dT%H:%M:%SZ")" | tee -a "$BUILD_LOG"
            if [ "{{ vepc_force_rebuild | default(false) | bool }}" = "True" ] || [ "{{ vepc_force_rebuild | default(false) | bool }}" = "true" ]; then
              ( time docker build --network=host --no-cache -f {{ vepc_repo_path }}/Dockerfile -t vepc-vepc:latest {{ vepc_repo_path }} ) 2>&1 | tee -a "$BUILD_LOG"
            else
              ( time docker build --network=host --cache-from {{ vepc_previous_image_cache }} -f {{ vepc_repo_path }}/Dockerfile -t vepc-vepc:latest {{ vepc_repo_path }} ) 2>&1 | tee -a "$BUILD_LOG"
            fi
            rc=${PIPESTATUS[0]}
            echo "BUILD_EXIT_CODE=${rc}" | tee -a "$BUILD_LOG"
            echo "Finished vEPC core build: $(date -u +"%Y-%m-%dT%H:%M:%SZ")" | tee -a "$BUILD_LOG"
            exit $rc
          register: core_build
          become: yes
          retries: 3
          delay: 10
          until: core_build.rc == 0

        - name: Fallback attempt docker-compose build (legacy fallback)
          shell: |
            cd {{ vepc_repo_path }}
            {{ docker_compose_cmd }} build {% if vepc_force_rebuild | bool %}--no-cache {% endif %}--pull vepc vepc-web
          become: yes
          register: docker_build_fallback
          failed_when: docker_build_fallback.rc != 0
          when: "(web_build is defined and web_build.rc != 0) or (core_build is defined and core_build.rc != 0)"

        - name: Fail if both direct docker build and fallback failed
          fail:
            msg: "Both direct docker build and fallback docker compose build failed. See previous logs."
          when: "((web_build is defined and web_build.rc != 0) and (docker_build_fallback is defined and docker_build_fallback.rc != 0)) or ((core_build is defined and core_build.rc != 0) and (docker_build_fallback is defined and docker_build_fallback.rc != 0))"
      notify: restart vepc container

    - name: Recreate vepc-web service to apply new build
      shell: |
        {{ docker_compose_cmd }} --project-directory {{ vepc_repo_path }} -f {{ vepc_repo_path }}/docker-compose.yml up -d --no-deps --force-recreate vepc-web
      become: yes
      register: vepc_web_up
      failed_when: vepc_web_up.rc != 0
      changed_when: "'Recreated' in vepc_web_up.stdout or 'Creating' in vepc_web_up.stdout or 'Starting' in vepc_web_up.stdout"

    # ==================== Configuration ====================
    - name: Copy vEPC configuration files
      template:
        src: "{{ item.src }}"
        dest: "{{ config_path }}/{{ item.dest }}"
        owner: "{{ vepc_user }}"
        group: "{{ vepc_group }}"
        mode: '0644'
        backup: yes
      loop:
        - { src: "config/vepc.config.j2", dest: "vepc.config" }
        - { src: "config/interfaces.conf.j2", dest: "interfaces.conf" }
        - { src: "config/vmme.conf.j2", dest: "vmme.conf" }
        - { src: "config/vsgsn.conf.j2", dest: "vsgsn.conf" }
      notify: restart vepc container

    - name: Collect host traffic port state and MAC
      shell: |
        port={{ item }}
        state=$(cat /sys/class/net/${port}/operstate 2>/dev/null || echo unknown)
        mac=$(cat /sys/class/net/${port}/address 2>/dev/null || echo N/A)
        echo "${port}=${state}|${mac}"
      register: port_facts_raw
      loop: "{{ traffic_linux_ports }}"
      changed_when: false

    - name: Write traffic ports info file
      copy:
        dest: "{{ config_path }}/traffic_ports.info"
        content: "{{ port_facts_raw.results | map(attribute='stdout') | join('\n') }}\n"
        owner: "{{ vepc_user }}"
        group: "{{ vepc_group }}"
        mode: '0644'
      notify: restart vepc container

    # ==================== Docker Compose Setup ====================
    - name: Deploy docker-compose.yml
      template:
        src: "docker-compose.yml.j2"
        dest: "{{ vepc_repo_path }}/docker-compose.yml"
        owner: "{{ vepc_user }}"
        group: "{{ vepc_group }}"
        mode: '0644'
      notify: restart vepc container

    - name: Remove legacy vepc container if requested
      when: vepc_remove_old_container | bool
      become: yes
      shell: |
        if docker ps -a --filter "name={{ vepc_old_container_name }}" -q | grep -q .; then
          docker rm -f {{ vepc_old_container_name }} || true
        fi


    # ==================== Container Deployment ====================
    - name: Start vEPC container with docker compose
      shell: |
        cd {{ vepc_repo_path }}
        {{ docker_compose_cmd }} up -d --force-recreate --remove-orphans
      become: yes
      args:
        chdir: "{{ vepc_repo_path }}"
      environment:
        REPO_URL: "{{ vepc_repo_url }}"
        REPO_BRANCH: "{{ vepc_repo_branch }}"
      register: compose_result
      changed_when: "'Creating' in compose_result.stdout or 'Starting' in compose_result.stdout"

    - name: Wait for vEPC service to be ready
      wait_for:
        path: "{{ cli_socket_path }}"
        delay: 2
        timeout: 60
      register: wait_sock
      failed_when: wait_sock is failed

    # ==================== Health Check ====================
    - name: Verify vEPC container is running
      docker_container_info:
        name: "{{ vepc_container_name }}"
      register: container_info
      failed_when: container_info.exists == false or container_info.container['State']['Running'] == false

    - name: Check vEPC service health
      command: docker exec {{ vepc_container_name }} /app/vepc-cli status
      register: health_check
      changed_when: false
      failed_when: health_check.rc != 0
      ignore_errors: yes

    # ==================== Systemd Service ====================
    # Note: vEPC is managed via Docker Compose only. Previous behavior
    # that created and enabled a systemd unit for vepc has been removed
    # to avoid duplicate service management. Use docker compose to control
    # the vepc container (see handlers and documentation above).

    # ==================== Firewall Configuration ====================
    - name: Allow SSH through UFW before enabling
      ufw:
        rule: allow
        port: "22"
        proto: tcp
      when: ansible_distribution == "Ubuntu"
      ignore_errors: yes

    - name: Allow SSH CLI port through UFW
      ufw:
        rule: allow
        port: "{{ ssh_cli_port | string }}"
        proto: tcp
      when: ansible_distribution == "Ubuntu" and ssh_cli_enabled | bool
      ignore_errors: yes

    - name: Configure UFW firewall rules
      ufw:
        rule: allow
        port: "{{ item }}"
        proto: "{{ 'tcp' if item == cli_port else 'udp' }}"
        state: enabled
      loop:
        - "{{ gtp_c_port }}"
        - "{{ s1ap_port }}"
        - "{{ diameter_port }}"
        - "{{ cli_port }}"
      when: ansible_distribution == "Ubuntu"
      ignore_errors: yes

    - name: Configure CLI access users
      user:
        name: "{{ item.name }}"
        password: "{{ item.password | password_hash('sha512') }}"
        update_password: always
        shell: /bin/bash
        createhome: yes
        state: present
      loop: "{{ cli_users }}"
      when: ssh_cli_enabled | bool

    - name: Add CLI users to docker group
      user:
        name: "{{ item.name }}"
        groups: docker
        append: yes
      loop: "{{ cli_users }}"
      when: ssh_cli_enabled | bool

    - name: Check for root authorized_keys
      stat:
        path: /root/.ssh/authorized_keys
      register: root_authorized_keys
      when: ssh_cli_enabled | bool

    - name: Ensure SSH directory exists for each CLI user
      file:
        path: "/home/{{ item.name }}/.ssh"
        state: directory
        owner: "{{ item.name }}"
        group: "{{ item.name }}"
        mode: '0700'
      loop: "{{ cli_users }}"
      when: ssh_cli_enabled | bool

    - name: Reuse root authorized_keys for CLI users when available
      copy:
        src: /root/.ssh/authorized_keys
        dest: "/home/{{ item.name }}/.ssh/authorized_keys"
        remote_src: true
        owner: "{{ item.name }}"
        group: "{{ item.name }}"
        mode: '0600'
      loop: "{{ cli_users }}"
      when: ssh_cli_enabled | bool and root_authorized_keys.stat.exists

    - name: Remove legacy shared sshd CLI port config
      file:
        path: /etc/ssh/sshd_config.d/90-vepc-cli.conf
        state: absent
      when: ssh_cli_enabled | bool
      notify: reload ssh

    - name: Install dedicated SSH daemon config for CLI access
      copy:
        dest: /etc/ssh/sshd_config_vepc_cli
        mode: '0600'
        content: |
          Port {{ ssh_cli_port }}
          ListenAddress 0.0.0.0
          Protocol 2
          PidFile /run/sshd_vepc_cli.pid
          AuthorizedKeysFile .ssh/authorized_keys
          HostKey /etc/ssh/ssh_host_rsa_key
          HostKey /etc/ssh/ssh_host_ecdsa_key
          HostKey /etc/ssh/ssh_host_ed25519_key
          PasswordAuthentication yes
          PubkeyAuthentication yes
          KbdInteractiveAuthentication no
          ChallengeResponseAuthentication no
          UsePAM yes
          PermitRootLogin no
          AllowUsers {{ cli_users | map(attribute='name') | join(' ') }}
          PermitTTY yes
          X11Forwarding no
          AllowTcpForwarding no
          PermitTunnel no
          PrintMotd no
          Subsystem sftp internal-sftp
            ForceCommand docker compose -f {{ vepc_repo_path }}/docker-compose.yml exec vepc /app/vepc-cli
      when: ssh_cli_enabled | bool

    - name: Validate dedicated CLI sshd configuration
      command: /usr/sbin/sshd -t -f /etc/ssh/sshd_config_vepc_cli
      changed_when: false
      when: ssh_cli_enabled | bool

    - name: Install dedicated CLI sshd systemd service
      copy:
        dest: /etc/systemd/system/vepc-cli-sshd.service
        mode: '0644'
        content: |
          [Unit]
          Description=vEPC dedicated SSH CLI service
          After=network.target docker.service
          Requires=docker.service

          [Service]
          Type=simple
          ExecStartPre=/usr/sbin/sshd -t -f /etc/ssh/sshd_config_vepc_cli
          ExecStart=/usr/sbin/sshd -D -f /etc/ssh/sshd_config_vepc_cli
          Restart=always
          RestartSec=3

          [Install]
          WantedBy=multi-user.target
      when: ssh_cli_enabled | bool
      notify: reload systemd

    - name: Open dedicated SSH CLI port in UFW
      ufw:
        rule: allow
        port: "{{ ssh_cli_port }}"
        proto: tcp
      when: ssh_cli_enabled | bool and ansible_distribution == "Ubuntu"
      ignore_errors: yes

    - name: Ensure SSH service is enabled and running
      service:
        name: ssh
        state: started
        enabled: yes
      when: ssh_cli_enabled | bool

    - name: Start dedicated CLI sshd service
      systemd:
        name: vepc-cli-sshd
        state: restarted
        enabled: yes
        daemon_reload: yes
      when: ssh_cli_enabled | bool

    - name: Wait for dedicated SSH CLI port to become ready
      wait_for:
        host: "127.0.0.1"
        port: "{{ ssh_cli_port }}"
        delay: 1
        timeout: 30
      when: ssh_cli_enabled | bool


    # ==================== Network Configuration ====================
    - name: Enable IP forwarding
      sysctl:
        name: net.ipv4.ip_forward
        value: '1'
        state: present
        reload: yes

    - name: Configure network namespace isolation
      sysctl:
        name: "{{ item }}"
        value: '1'
        state: present
        reload: yes
      loop:
        - net.ipv4.conf.all.forwarding
        - net.ipv6.conf.all.forwarding
      when: enable_network_namespaces | bool

    # ==================== Post-deployment ====================
    - name: Create deployment summary
      template:
        src: "deployment_info.txt.j2"
        dest: "{{ log_path }}/deployment_info.txt"
        owner: "{{ vepc_user }}"
        group: "{{ vepc_group }}"
        mode: '0644'

    - name: Display deployment information
      debug:
        msg: |
          ============================================
          vEPC Deployment Summary
          ============================================
          Repository: {{ vepc_repo_url }}
          Branch: {{ vepc_repo_branch }}
          Location: {{ vepc_repo_path }}
          Config: {{ config_path }}
          Logs: {{ log_path }}
          
          Container: {{ vepc_container_name }}
          Image: {{ vepc_docker_image }}
          
          Services:
          - GTP-C: localhost:{{ gtp_c_port }}/udp
          - S1AP: localhost:{{ s1ap_port }}/sctp
          - Diameter: localhost:{{ diameter_port }}/udp
          - CLI: localhost:{{ cli_port }}/tcp
          - SSH CLI: localhost:{{ ssh_cli_port }}/tcp (users: {{ cli_users | map(attribute='name') | join(', ') }})
          - Traffic Linux Ports: {{ traffic_linux_ports | join(', ') }}
          
          Optional use to access the CLI:
          $ docker compose -f {{ vepc_repo_path }}/docker-compose.yml exec vepc /app/vepc-cli
          
          View logs:
          $ docker logs -f {{ vepc_container_name }}
          
          Restart the service (docker):
          $ docker compose -f {{ vepc_repo_path }}/docker-compose.yml restart vepc
          ============================================

  handlers:
    - name: reload systemd
      systemd:
        daemon_reload: yes

    - name: reload ssh
      service:
        name: ssh
        state: restarted

    # 'enable vepc service' handler removed; vepc managed by docker-compose

    - name: restart vepc container
      shell: |
        cd {{ vepc_repo_path }}
        {{ docker_compose_cmd }} restart
      become: yes
      become_user: root
      ignore_errors: yes
