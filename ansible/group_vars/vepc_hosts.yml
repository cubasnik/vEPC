---
# Group variables for vepc_hosts
# This file is automatically loaded by Ansible and overrides defaults from the playbook.
# Prefer setting traffic_linux_ports per host in ansible/inventory.

# Traffic ports allowlist (optional here): Linux interfaces allowed for bind/create-vlan traffic operations.
# Leave commented if you set it in inventory, for example:
# traffic_linux_ports:
#   - eno1
#   - eno3

# Optional: Override other variables per group here
# Example:
# cli_users:
#   - name: "vepccli"
#     password: "vepccli"
#   - name: "admin"
#     password: "AdminPass123"
