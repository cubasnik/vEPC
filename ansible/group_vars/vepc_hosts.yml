---
# Group variables for vepc_hosts
# This file is automatically loaded by Ansible and overrides defaults from the playbook

# Traffic ports allowlist (required): Linux interfaces allowed for bind/create-vlan traffic operations.
# Must be a YAML list (not a string)
traffic_linux_ports:
  - eno1
  - eno2
  - eno3
  - eno4

# Optional: Override other variables per group here
# Example:
# cli_users:
#   - name: "vepccli"
#     password: "vepccli"
#   - name: "admin"
#     password: "AdminPass123"
