  bind-ip = 127.0.0.1
  bind-port = 3868
  hss-host = hss.vepc.local
  hss-realm = epc.mnc001.mcc001.3gppnetwork.org

# S11 к SGW (GTP-C)
s11
  bind-ip = 127.0.0.1
  bind-port = 2123