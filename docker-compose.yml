services:
  vepc:
    build:
      context: .
      dockerfile: Dockerfile
    
    container_name: vepc-mme-sgsn
    hostname: vepc
    
    # Network capabilities needed for interface management
    cap_add:
      - SYS_ADMIN
      - NET_ADMIN
      - SYS_PTRACE
    
    # Run as root so NET_ADMIN is effective for iproute2 VLAN operations.
    user: "0:0"

    # Use the host network namespace for access to host NICs such as eno2.
    network_mode: host
    
    volumes:
      # Configuration directory
      - ./config:/etc/vepc
      # Logs directory
      - vepc-logs:/var/log/vepc
      # Shared socket directory (mounted into /tmp inside containers)
      - ./sockets:/tmp
      # Optional: share network namespace for host interface access
      # - /etc/sysctl.conf:/etc/sysctl.conf:ro
    
    environment:
      # Set to 'debug' for verbose logging
      - LOG_LEVEL=info
      - CONFIG_PATH=/etc/vepc
      - LOG_PATH=/var/log/vepc
    
    # Keep container running
    stdin_open: true
    tty: true
    
    # Restart policy
    restart: unless-stopped
    
    # Health check
    healthcheck:
      test: ["CMD", "/app/vepc-cli", "status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    
    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "vepc=core"

  vepc-web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: vepc-web
    ports:
      - "3000:3000"
    depends_on:
      - vepc
    volumes:
      - ./config:/etc/vepc:ro
      - ./sockets:/tmp:rw
    environment:
      - NODE_ENV=production
    restart: unless-stopped

volumes:
  vepc-logs:
    driver: local
