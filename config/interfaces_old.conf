# ================================================================
#  vEPC — конфигурация интерфейсов
#  Формат: [Имя]
#          protocol = <протокол>
#          ip       = <локальный IP>
#          port     = <порт(ы)>
#          to       = <Remote NE>
#          desc     = <краткое описание>
# ================================================================

# S1-MME — интерфейс между MME и eNodeB (LTE)
# Используется для управляющих сообщений S1AP:
# Attach, Detach, Handover, Paging, Bearer Setup
[S1-MME]
  protocol = S1AP
  ip       = 127.0.0.1
  port     = 36412
  mcc      = 250
  mnc      = 20
  to       = eNodeB
  desc     = MME <-> eNodeB (LTE control plane)

# Gb — интерфейс между SGSN и BSC/PCU (2G/GPRS)
# Используется для передачи пользовательских данных GPRS
# через протоколы BSSGP (управление) и NS (транспорт)
[Gb]
  protocol = BSSGP/NS
  ip       = 127.0.0.1
  port     = 2152
  mcc      = 250
  mnc      = 20
  to       = BSC/PCU
  desc     = SGSN <-> BSC/PCU (2G/GPRS user plane)

# S6a — интерфейс между MME и HSS (Home Subscriber Server)
# Используется для аутентификации абонентов (EAP-AKA),
# получения профилей подписки и управления местоположением
[S6a]
  protocol = Diameter
  ip       = 127.0.0.1
  port     = 3868
  to       = HSS
  desc     = MME <-> HSS (authentication & subscriber data)

# S11 — интерфейс между MME и SGW (Serving Gateway)
# Используется для управления GTP-сессиями (создание,
# изменение, удаление bearer-сессий)
[S11]
  protocol = GTP-C
  ip       = 127.0.0.1
  port     = 2123
  to       = SGW
  desc     = MME <-> SGW (session management)

# Gn/Gp — интерфейсы между SGSN и GGSN/PGW (2G/3G)
# Gn — внутри одной сети (intra-PLMN)
# Gp — между разными сетями (inter-PLMN roaming)
# GTP-C: управление сессиями, GTP-U: пользовательский трафик
[Gn/Gp]
  protocol = GTP-C/GTP-U
  ip       = 127.0.0.1
  port     = 2123/2152
  to       = GGSN/PGW
  desc     = SGSN <-> GGSN/PGW (2G/3G data plane + roaming)
